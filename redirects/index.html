<!DOCTYPE html>
<html>
<body>
<script type="text/javascript">
window.onload = function() {
    function isCustomProtocolSupported(protocol) {
      return navigator.protocol === protocol + ":";
    }

    console.log(window.location.search);
    const urlParams = new URLSearchParams(window.location.search);
    var deeplink = urlParams.get('deeplink');
    console.log(deeplink);
    deeplink = decodeURIComponent((deeplink + '').replace(/\+/g, '%20'));
    console.log(deeplink);
    var fallback = urlParams.get('fallback');
    console.log(fallback);
    fallback = decodeURIComponent((fallback + '').replace(/\+/g, '%20'));
    console.log(fallback);
    console.log('isCustomProtocolSupported', isCustomProtocolSupported('bank100000000012'));

    if (isCustomProtocolSupported('bank100000000012')) {
        const link = document.createElement('a');
        link.setAttribute('href', deeplink);
        document.body.appendChild(link);
        link.click();
    } else {
        window.location.replace(fallback);
    }
};
</script>
</body>
</html>
