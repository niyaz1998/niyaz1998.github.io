<!DOCTYPE html>
<html>
<head>
    <!-- этот стиль нужен, чтобы на iphone был правильный паддинг,
    так как там SafeArea в вебе не работает
    Источник:
    https://github.com/flutter/flutter/issues/84833#issuecomment-1676625367 -->
    <style>
    #host {
      height: calc(100% - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      width: calc(100% - env(safe-area-inset-left) - env(safe-area-inset-right));
      position: fixed;
      z-index: 1;
      left: env(safe-area-inset-left);
      top: env(safe-area-inset-top);
      overflow: hidden;
      padding: 0px;
      margin: 0px;
      user-select: none;
      touch-action: none;
    }

    </style>
    <base href="/rbi-pwa/">

    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta name="description" content="A new Flutter project.">

    <!-- iOS meta tags & icons -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="invest">
    <link rel="apple-touch-icon" href="icons/Icon-192.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png"/>

    <title>invest</title>
    <link rel="manifest" href="manifest.json">

    <script>
    // The value below is injected by flutter build, do not touch.
    var serviceWorkerVersion = "2699063721";


    </script>
    <!-- This script adds the flutter initialization JS code -->
    <script src="flutter.js" defer></script>
    <script src="scripts/indexed_db.js" defer></script>
    <script src="scripts/add_to_home_screen.js" defer></script>
</head>
<body>

<!-- loads main.dart.js -->
<script>
    window.addEventListener('load', function(ev) {
      // Download main.dart.js
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });

</script>

<!-- for syncfusion_flutter_pdfviewer -->
<script src="//cdnjs.cloudflare.com/ajax/libs/pdf.js/2.4.456/pdf.min.js"></script>
<!-- for syncfusion_flutter_pdfviewer -->
<script type="text/javascript">
   pdfjsLib.GlobalWorkerOptions.workerSrc = "//cdnjs.cloudflare.com/ajax/libs/pdf.js/2.4.456/pdf.worker.min.js";

</script>

<!-- firebase messaging -->
<script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("/firebase-messaging-sw.js");
      });
    }

</script>
</body>
</html>
